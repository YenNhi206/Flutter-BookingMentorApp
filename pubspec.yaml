name: scoops
description: "Scoops - Order & Eat. Flutter dessert & food ordering app (PRM393 project)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management (MVVM ViewModels are ChangeNotifiers)
  provider: ^6.1.2

  # Local database
  sqflite: ^2.4.1
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.0

  # Session persistence (remembers logged-in user id between app launches)
  shared_preferences: ^2.3.3

  # Branding font (Poppins)
  google_fonts: ^6.2.1

  # Map (OpenStreetMap, no API key required) for the store-locator screen
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.5
  shimmer: ^3.0.0

  # QR code for the pickup voucher
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.13

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
